<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link type="text/css" rel="stylesheet" href="../css/navbar_footer.css">
    <link type="text/css" rel="stylesheet" href="../css/signup.css?v=1.0">
    <title>Sing Up page</title>
    <link rel="preconnect" href="https://challenges.cloudflare.com" /><!--For performance-->
    <script
        src="https://challenges.cloudflare.com/turnstile/v0/api.js"
        async
        defer
        ></script>
</head>
<body>
    
    <div id="topnav">
            <a href="main.html">Home</a>
            <div id="authButtons">
                <a class="left-corner" href="login.html">Login</a>
                <a class="left-corner" href="signup.html">SignUp</a>
            </div>
    </div>
<div id = "container" >
    
    <div id="basic_form">
        <form  action="../php/signup.php" method="POST">
            <ul>
                <li>    
                    <h2>SING UP NOW!</h2>
                </li>
                <li>
                    <h3>First Name</h3>
                    <input type="text" name="fname" id="" pattern="[a-zA-Z]+" required>
                </li>
                <li>
                    <h3>Last Name</h3>
                    <input type="text" name="lname" id="" pattern="[a-zA-Z]+" required>
                </li>
                <li>
                    <h3>Username</h3>
                    <input type="text" name="username" id="" required> 
                </li>
                <li>
                    <h3>Password</h3>
                    <input type="password" name="password" id="" pattern="[a-zA-Z0-9]{8,20}" required
                    title="Your username must be at  8-20 characters long and contain at least one number.">
                </li>
                <li>
                    <h3>Email</h3>
                    <input type="email" name="email" id="" required>
                </li>
                <li>
                    <h3>Phone Number</h3>
                    <input type="tel" name="phone" id="">
                </li>
                <li>
                    <button id="submit" type="submit">Sign up</button>
                </li>
            </ul>
        </form>

        <div
            class="cf-turnstile"
            data-sitekey="0x4AAAAAAC1mNg-zjHN3Kgz-"
            data-theme="light"
            data-size="normal"
            data-callback="onSuccess"
        ></div>
    </div>
    
</div>








    
</body>


</html>
